version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0.36
    container_name: devstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: devstore
      MYSQL_USER: devstore
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devstore123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/devstore-all.sql:/docker-entrypoint-initdb.d/devstore-all.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - devstore-net

  redis:
    image: redis:7.2.4-alpine
    container_name: devstore-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - devstore-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: devstore-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      TZ: Asia/Shanghai
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - devstore-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: devstore-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - devstore-net

  # ── Application ───────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: deploy/docker/server.Dockerfile
    container_name: devstore-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./server/configs/config.yaml.example:/app/configs/config.yaml:ro
    environment:
      TZ: Asia/Shanghai
      DEVSTORE_MYSQL_DSN: devstore:${MYSQL_PASSWORD:-devstore123}@tcp(mysql:3306)/devstore?charset=utf8mb4&parseTime=True&loc=Local
      DEVSTORE_REDIS_ADDR: redis:6379
      DEVSTORE_RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      DEVSTORE_JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production}
      DEVSTORE_OAUTH_LINUX_DO_CLIENT_ID: ${LINUXDO_CLIENT_ID:-}
      DEVSTORE_OAUTH_LINUX_DO_CLIENT_SECRET: ${LINUXDO_CLIENT_SECRET:-}
      DEVSTORE_OAUTH_LINUX_DO_REDIRECT_URL: ${LINUXDO_REDIRECT_URL:-http://localhost/oauth/linux-do/callback}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - devstore-net

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    container_name: devstore-web
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - devstore-net

  admin:
    build:
      context: .
      dockerfile: deploy/docker/admin.Dockerfile
    container_name: devstore-admin
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - devstore-net

  nginx:
    image: nginx:1.27-alpine
    container_name: devstore-nginx
    restart: unless-stopped
    depends_on:
      - server
      - web
      - admin
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - devstore-net

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: devstore-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - devstore-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: devstore-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123456}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - devstore-net

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

networks:
  devstore-net:
    driver: bridge
