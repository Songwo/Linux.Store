openapi: 3.0.3
info:
  title: DevStore API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/register:
    post:
      summary: 用户注册
  /api/v1/auth/login:
    post:
      summary: 用户登录
